name: Build and Publish NuGet Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' 
          
      - name: Build
        run: dotnet build APi.Youtube.sln --configuration Release

      - name: Test
        run: dotnet test APi.Youtube.sln --configuration Release --no-build

      - name: Pack NuGet Package
        run: dotnet pack Src/PolyhydraGames.APi.Youtube.csproj --configuration Release --output ./output

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push ./output/*.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
